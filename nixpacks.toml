[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Extensions.pdo", "php82Extensions.pdo_sqlite", "php82Extensions.sqlite3", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.openssl"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
  "mkdir -p database storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs bootstrap/cache",
  "chmod -R 775 storage bootstrap/cache database"
]

[start]
cmd = "mkdir -p /app/database /app/storage/framework/sessions /app/storage/framework/views /app/storage/framework/cache/data /app/storage/logs /app/bootstrap/cache && touch /app/database/tracker.db && chmod -R 777 /app/storage /app/database /app/bootstrap/cache && printf 'APP_NAME=\"Team Activity Tracker\"\\nAPP_ENV=production\\nAPP_DEBUG=false\\nAPP_KEY=%s\\nDB_CONNECTION=sqlite\\nDB_DATABASE=/app/database/tracker.db\\nSESSION_DRIVER=file\\nSESSION_LIFETIME=480\\nCACHE_STORE=file\\nLOG_LEVEL=error\\n' \"$APP_KEY\" > /app/.env && php artisan migrate --force && php artisan db:seed --force && php artisan config:clear && php artisan serve --host=0.0.0.0 --port=$PORT"
