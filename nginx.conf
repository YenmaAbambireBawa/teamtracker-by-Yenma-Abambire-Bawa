worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    server {
        # Railway injects $PORT at runtime; default to 8000 for local use.
        listen ${PORT:-8000};
        server_name _;

        root /app/public;
        index index.php;

        # Serve static assets directly; fall back to Laravel's front controller.
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Pass PHP requests to PHP-FPM on the Unix socket.
        location ~ \.php$ {
            fastcgi_pass unix:/tmp/php-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }

        # Deny access to hidden files (e.g. .env, .git).
        location ~ /\. {
            deny all;
        }
    }
}
